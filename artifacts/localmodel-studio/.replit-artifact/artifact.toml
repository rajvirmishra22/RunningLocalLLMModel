kind = "web"
previewPath = "/"
title = "LocalModel Studio"
version = "1.0.0"
id = "artifacts/localmodel-studio"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24489

[services.development]
run = "pnpm --filter @workspace/localmodel-studio run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/localmodel-studio", "run", "build" ]
publicDir = "artifacts/localmodel-studio/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24489"
BASE_PATH = "/"
