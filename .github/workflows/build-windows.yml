name: Build Windows .exe

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri -> target
      # llama-cpp-2 builds llama.cpp from source and runs `bindgen`, which needs
      # libclang. windows-latest ships LLVM preinstalled at C:\Program Files\LLVM;
      # bindgen can't always locate it, so point LIBCLANG_PATH at it explicitly
      # (falling back to a choco install if the runner image ever drops it).
      - name: Provision libclang for llama-cpp-2 (bindgen)
        shell: pwsh
        run: |
          $llvm = "C:\Program Files\LLVM\bin"
          if (-not (Test-Path "$llvm\libclang.dll")) {
            choco install llvm -y
          }
          "LIBCLANG_PATH=$llvm" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
      - name: Install JS dependencies
        working-directory: desktop
        run: npm install
      - name: Generate Tauri icons
        working-directory: desktop
        run: npx @tauri-apps/cli icon src-tauri/icons/icon.png
      - name: Download bundled starter model
        working-directory: desktop
        shell: pwsh
        run: ./scripts/fetch-model.ps1
      - name: Build Tauri installer
        working-directory: desktop
        run: npm run tauri build
        env:
          # Bakes the deployed StudyCore api-server origin into the desktop build
          # so the Canvas (LMS) sync feature can reach the /api/canvas/* proxy.
          # Set this as a repo secret: Settings -> Secrets and variables ->
          # Actions -> New repository secret -> name VITE_API_BASE_URL, value
          # your published URL (e.g. https://your-app.replit.app). If left unset,
          # the build still succeeds; the Connections screen just shows a clear
          # "Canvas sync isn't configured" message.
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
      - uses: actions/upload-artifact@v4
        with:
          name: LocalModelStudio-Windows-Installer
          path: |
            desktop/src-tauri/target/release/bundle/nsis/*.exe
            desktop/src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: error
