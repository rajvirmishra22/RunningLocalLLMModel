name: Build Windows .exe

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri -> target
      - name: Install JS dependencies
        working-directory: desktop
        run: npm install
      - name: Generate Tauri icons
        working-directory: desktop
        run: npx @tauri-apps/cli icon src-tauri/icons/icon.png
      - name: Download bundled starter model
        working-directory: desktop
        shell: pwsh
        run: ./scripts/fetch-model.ps1
      - name: Build Tauri installer
        working-directory: desktop
        run: npm run tauri build

      # Publish the installer as a GitHub Release instead of an Actions
      # Artifact. Releases don't count against the (tiny) artifact storage
      # quota, never expire, are publicly downloadable, and give us the
      # stable URL that the landing page's InstallCTA needs.
      - name: Compute release tag
        id: tag
        shell: bash
        run: |
          STAMP=$(date -u +'%Y.%m.%d-%H%M')
          SHA_SHORT=${GITHUB_SHA::7}
          echo "tag=build-${STAMP}-${SHA_SHORT}" >> "$GITHUB_OUTPUT"
          echo "name=LocalModel Studio ${STAMP} (${SHA_SHORT})" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.name }}
          generate_release_notes: true
          files: |
            desktop/src-tauri/target/release/bundle/nsis/*.exe
            desktop/src-tauri/target/release/bundle/msi/*.msi
          fail_on_unmatched_files: true
